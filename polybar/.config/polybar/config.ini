[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880
connected = #4f8f68

[bar/example]
width = 100%
height = 50pt
radius = 0
margin-top = 0
margin-left = 0
margin-bottom = 0
margin-right = 0

; dpi = 96

offset-x = 0
offset-y = 0
padding = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1
padding-top = 0

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = momnospace:size=26;2
#font-0 = monospace;2
font-1 = "Symbols Nerd Font Mono:size=26"

modules-center = focused_app
modules-right = pulseaudio keyboard_layout_switcher wlan eth date menu-power

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

#override-redirect = false

[module/focused_app]
type = custom/script
exec = ~/.config/polybar/scripts/window-title.sh
label = %output%
interval = 2

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "%{T1}%{T-} "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "%{T1}󰝟%{T-}"
label-muted-foreground = ${colors.disabled}

[module/keyboard_layout_switcher]
type = custom/script
exec = ~/.config/polybar/scripts/keyboard_layout_switcher.sh
interval = 1
click-left = ~/.config/polybar/scripts/keyboard_layout_switcher.sh toggle

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = "%{T1}󰈀%{T-}"
label-disconnected = "%{T1}󰈂%{T-}"

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = "%{T1}󰤨%{T-}"
label-disconnected = "%{T1}󰤭%{T-}"
label-connected-foreground = ${colors.connected}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = "%{T1}󰈀%{T-}"
label-connected-foreground = ${colors.connected}

[module/date]
type = internal/date
interval = 1

date = %d-%m %H:%M

label = %date%
label-foreground = ${colors.primary}

[module/menu-power]
type = custom/menu
label-open = " %{T1}%{T-} "
label-close = " %{T1}%{T-} "
expand-right = false

# Shutdown entry
menu-0-0 = "%{T1}⏻%{T-} Shutdown "
menu-0-0-exec = #menu-power.open.1

# Reboot entry
menu-0-1 = "%{T1}󰜉%{T-} Reboot "
menu-0-1-exec = #menu-power.open.2

# Sleep Entry
menu-0-2 = "%{T1}󰒲%{T-} Sleep "
menu-0-2-exec = "systemctl sleep"

# Lock entry
menu-0-3 = "%{T1}%{T-} Lock "
menu-0-3-exec = gnome-screensaver-command -l

# Logout entry
menu-0-4 = "%{T1}󰍃%{T-} Logout "
menu-0-4-exec = gnome-session-quit --logout --no-prompt

# Confirm shutdown menu
menu-1-0 = "%{T1}%{T-} Confirm Shutdown "
menu-1-0-exec = "systemctl poweroff"
menu-1-1 = "%{T1}%{T-} Cancel "
menu-1-1-exec = #menu-power.open.0

# Confirm Reboot menu
menu-2-0 = "%{T1}%{T-} Confirm Reboot "
menu-2-0-exec = "systemctl reboot"
menu-2-1 = "%{T1}%{T-} Cancel "
menu-2-1-exec = #menu-power.open.0

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
